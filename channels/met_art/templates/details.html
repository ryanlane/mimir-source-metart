<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: {{ width }}px;
  height: {{ height }}px;
  overflow: hidden;
  background: #0d1117;
  font-family: 'Georgia', 'Times New Roman', serif;
  color: #e6edf3;
}

.card {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 6vmin;
  gap: 0;
}

.title-divider {
  width: 5vmin;
  height: 0.35vmin;
  background: #3fb950;
  border-radius: 2px;
  margin-bottom: 2.5vmin;
  flex-shrink: 0;
}

.title {
  font-size: 5.5vmin;
  font-weight: 600;
  color: #f0f6fc;
  line-height: 1.2;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  margin-bottom: 1.8vmin;
  flex-shrink: 0;
}

.artist {
  font-size: 3.2vmin;
  color: #7ee787;
  font-style: italic;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  margin-bottom: 3.5vmin;
  flex-shrink: 0;
}

.meta-list {
  display: flex;
  flex-direction: column;
  gap: 1vmin;
}

.meta-row {
  display: flex;
  gap: 1.5vmin;
  align-items: baseline;
  overflow: hidden;
}

.meta-label {
  font-size: 1.6vmin;
  color: #484f58;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  flex-shrink: 0;
  min-width: 9vmin;
  font-family: system-ui, -apple-system, sans-serif;
}

.meta-value {
  font-size: 2.2vmin;
  color: #8b949e;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  font-family: system-ui, -apple-system, sans-serif;
}

.museum-badge {
  position: absolute;
  bottom: 4vmin;
  left: 6vmin;
  font-size: 1.4vmin;
  color: #21262d;
  font-family: system-ui, -apple-system, sans-serif;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
</style>
</head>
<body>
<div class="card">
  <div class="title-divider"></div>
  <div class="title">{{ title }}</div>
  {% if artist %}
  <div class="artist">{{ artist }}</div>
  {% endif %}
  <div class="meta-list">
    {% if date %}
    <div class="meta-row">
      <span class="meta-label">Date</span>
      <span class="meta-value">{{ date }}</span>
    </div>
    {% endif %}
    {% if medium %}
    <div class="meta-row">
      <span class="meta-label">Medium</span>
      <span class="meta-value">{{ medium }}</span>
    </div>
    {% endif %}
    {% if department %}
    <div class="meta-row">
      <span class="meta-label">Gallery</span>
      <span class="meta-value">{{ department }}</span>
    </div>
    {% endif %}
    {% if culture %}
    <div class="meta-row">
      <span class="meta-label">Culture</span>
      <span class="meta-value">{{ culture }}</span>
    </div>
    {% endif %}
  </div>
</div>
<div class="museum-badge">The Metropolitan Museum of Art</div>
</body>
</html>
